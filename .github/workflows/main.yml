name: RDP Tanpa Key (Bore Fixed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Setup System (RDP + Firewall + Password + Name)
      - name: Setup System (Richo Config)
        run: |
          Write-Host "🚀 Mengkonfigurasi Sistem..."
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled False
          $password = ConvertTo-SecureString -String "P@ssw0rd123!" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $password
          $newName = "richo"
          $env:COMPUTERNAME = $newName
          [Environment]::SetEnvironmentVariable("COMPUTERNAME", $newName, "User")
          Write-Host "✅ System Configured (Name: richo)"

      # 2. Setup Virtual Keyboard Shortcut
      - name: Setup Virtual Keyboard Shortcut
        run: |
          Write-Host "⌨️ Creating Virtual Keyboard Shortcut..."
          $SourceFileLocation = "$env:SystemRoot\System32\osk.exe"
          $ShortcutLocation = "$env:USERPROFILE\Desktop\Virtual Keyboard.lnk"
          $WScriptShell = New-Object -ComObject WScript.Shell
          $Shortcut = $WScriptShell.CreateShortcut($ShortcutLocation)
          $Shortcut.TargetPath = $SourceFileLocation
          $Shortcut.Save()
          Copy-Item $ShortcutLocation -Destination "C:\Users\Public\Desktop\Virtual Keyboard.lnk" -Force
          Write-Host "✅ Virtual Keyboard ready on Desktop"

      # 3. Jalankan Tunnel (Bore) - FIXED
      - name: Start Bore Tunnel
        run: |
          Write-Host "⬇️ Downloading Bore..."
          Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.5.2/bore-v0.5.2-x86_64-pc-windows-msvc.zip" -OutFile "bore.zip"
          Expand-Archive "bore.zip" -DestinationPath "."
          
          Write-Host "🚀 Starting Bore Tunnel..."
          Start-Process -FilePath ".\bore.exe" -ArgumentList "local 3389 --to bore.pub" -RedirectStandardOutput "bore_log.txt" -NoNewWindow
          
          Write-Host "⏳ Menunggu koneksi (8 detik)..."
          Start-Sleep -Seconds 8
          
          if (Test-Path "bore_log.txt") {
            # FIX: Pakai -Raw agar dibaca sebagai satu string utuh
            $logContent = Get-Content "bore_log.txt" -Raw
            Write-Host "📄 RAW LOG: $logContent"
            
            if ($logContent -match "bore.pub:(\d+)") {
                $port = $matches[1]
                Write-Host "========================================="
                Write-Host "✅ RDP SIAP AKSES!"
                Write-Host "========================================="
                Write-Host "🔗 ALAMAT RDP : bore.pub:$port"
                Write-Host "👤 Username   : runneradmin"
                Write-Host "🔑 Password   : P@ssw0rd123!"
                Write-Host "========================================="
            } else {
                Write-Warning "⚠️ Gagal ambil port otomatis. Cek 'RAW LOG' di atas manual."
            }
          }

      # 4. Keep Alive
      - name: Keep Alive
        run: |
          Write-Host "🔄 Menjaga sesi tetap aktif..."
          while ($true) { Start-Sleep -Seconds 60 }
